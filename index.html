<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Edzésnapló</title>
<style>
:root {
  --bg: #0d0d10;
  --bg2: #16161c;
  --bg3: #1e1e26;
  --bg4: #26262f;
  --bg5: #2e2e38;
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --accent-dim2: rgba(200,241,53,0.06);
  --text: #f0f0f2;
  --text2: #8888a0;
  --text3: #44445a;
  --yellow: #facc15;
  --yellow-dim: rgba(250,204,21,0.1);
  --red: #ff453a;
  --blue: #4da6ff;
  --orange: #ff9f0a;
  --green: #32d74b;
  --purple: #bf5af2;
  --r: 16px;
  --r-sm: 10px;
  --r-xs: 7px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;padding:0 16px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{font-size:19px;font-weight:800;letter-spacing:-0.5px;}
.logo em{color:var(--accent);font-style:normal;}
.tab-row{display:flex;gap:6px;padding:8px 0 10px;overflow-x:auto;scrollbar-width:none;}
.tab-row::-webkit-scrollbar{display:none;}
.tab{background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:var(--text2);font-size:13px;font-weight:600;padding:7px 15px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#111;}
.tab:active{transform:scale(.95);}

/* CONTENT */
.content{padding:14px 14px 96px;}

/* DAY BLOCK */
.day-block{margin-bottom:10px;border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
.day-hdr{display:flex;align-items:center;gap:12px;padding:15px 16px;background:var(--bg2);cursor:pointer;user-select:none;}
.day-pill{height:28px;padding:0 11px;border-radius:14px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:0.2px;flex-shrink:0;}
.day-pill svg{width:13px;height:13px;flex-shrink:0;}
.day-name-text{font-size:15px;font-weight:600;flex:1;}
.day-chevron{color:var(--text3);font-size:20px;transition:transform .25s;line-height:1;}
.day-block.open .day-chevron{transform:rotate(180deg);}
.day-exlist{display:none;background:var(--bg2);}
.day-block.open .day-exlist{display:block;}

/* EXERCISE */
.ex-block{padding:14px 16px 10px;border-top:1px solid rgba(255,255,255,0.05);}
.ex-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3;}
.col-hdr{display:grid;grid-template-columns:32px 1fr 1fr 68px;gap:7px;margin-bottom:5px;}
.col-h{font-size:10px;font-weight:700;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:0.6px;}

/* SET ROW */
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 68px;gap:7px;margin-bottom:5px;align-items:start;}
.set-lbl{height:46px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:var(--r-xs);font-size:11px;font-weight:800;color:var(--text3);letter-spacing:0.3px;}
.set-inp-wrap{display:flex;flex-direction:column;gap:3px;}
.set-inp{background:var(--bg3);border:1.5px solid rgba(255,255,255,0.07);border-radius:var(--r-xs);color:var(--text);font-size:17px;font-weight:600;height:46px;padding:0 8px;text-align:center;width:100%;outline:none;-webkit-appearance:none;transition:border-color .15s,background .15s;}
.set-inp:focus{border-color:var(--accent);background:var(--accent-dim2);}
.set-inp::placeholder{color:var(--text3);font-size:13px;font-weight:400;}
.set-inp.rir{background:var(--yellow-dim);border-color:rgba(250,204,21,0.15);color:var(--yellow);}
.set-inp.rir:focus{border-color:var(--yellow);}
.prev-val{font-size:10px;color:var(--text3);text-align:center;height:13px;line-height:13px;}

/* NEW CYCLE BANNER */
.new-cycle-banner{margin:0 0 16px;background:var(--accent-dim);border:1px solid rgba(200,241,53,0.25);border-radius:var(--r);padding:16px;}
.ncb-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.ncb-sub{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.4;}
.ncb-btn{background:var(--accent);border:none;border-radius:var(--r-sm);color:#111;font-size:14px;font-weight:800;padding:11px 20px;cursor:pointer;width:100%;transition:opacity .15s;}
.ncb-btn:active{opacity:.8;}

/* STAT PAGE */
.pr-page{padding:14px 14px 96px;}
.pr-card{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.pr-card-hdr{padding:13px 16px 11px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pr-ex{font-size:14px;font-weight:700;flex:1;line-height:1.3;}
.pr-badge{background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;white-space:nowrap;flex-shrink:0;}
.pr-cycles{display:grid;grid-template-columns:repeat(3,1fr);}
.pr-cyc{padding:11px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.05);}
.pr-cyc:last-child{border-right:none;}
.pr-cyc-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.pr-1rm{font-size:19px;font-weight:800;color:var(--text2);}
.pr-1rm.is-pr{color:var(--accent);}
.pr-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}
.pr-empty{font-size:13px;color:var(--text3);font-style:italic;padding:12px 16px;}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--accent);color:#111;font-size:13px;font-weight:800;padding:9px 22px;border-radius:20px;opacity:0;transition:all .25s;z-index:500;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid rgba(255,255,255,0.07);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:200;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0 13px;color:var(--text3);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border:none;background:none;transition:color .15s;}
.bnav-btn svg{width:23px;height:23px;stroke-width:1.8;}
.bnav-btn.active{color:var(--accent);}
.bnav-btn:active{opacity:.6;}

/* DAY PILL COLORS */
.pill-leg{background:rgba(255,107,107,0.12);color:#ff6b6b;}
.pill-upper{background:rgba(77,166,255,0.12);color:var(--blue);}
.pill-lower{background:rgba(255,159,10,0.12);color:var(--orange);}
.pill-push{background:rgba(191,90,242,0.12);color:var(--purple);}
.pill-pull{background:rgba(50,215,75,0.12);color:var(--green);}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
</style>
</head>
<body>
<div class="toast" id="toast">Mentve ✓</div>
<div id="app"></div>
<script>
const DAYS = [
  {id:"hetfo",name:"Hétfő",sub:"Leg",pill:"pill-leg",icon:'<path d="M12 3c0 0-4 4-4 9s4 9 4 9M16 7c0 0-2 3-2 5s2 5 2 5" stroke="currentColor" stroke-linecap="round"/>',
   exercises:[
    {name:"Hack guggolás (gumi assist)",sets:2},
    {name:"Combhajlító",sets:2},
    {name:"Combfeszítő",sets:2},
    {name:"Vádli",sets:3},
    {name:"Comb tárogatás",sets:2},
    {name:"Hasazás",sets:3},
  ]},
  {id:"szerda",name:"Szerda",sub:"Felső test",pill:"pill-upper",icon:'<path d="M6 12h12M12 6v12" stroke="currentColor" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor"/>',
   exercises:[
    {name:"Fekvenyomás gépen",sets:2},
    {name:"Lehúzás két kézzel gépen",sets:2},
    {name:"Evezés szűk/széles fogással gépen",sets:2},
    {name:"Vállból nyomás",sets:2},
    {name:"Tricepsz letolás csigán 1 kézzel",sets:2},
    {name:"Bicepsz gépen",sets:2},
  ]},
  {id:"csutortok",name:"Csütörtök",sub:"Alsó test",pill:"pill-lower",icon:'<path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"RDL",sets:2},
    {name:"Bolgár guggolás",sets:2},
    {name:"Combhajlító",sets:2},
    {name:"Vádli",sets:3},
    {name:"Comb tárogatás",sets:2},
    {name:"Hasazás",sets:3},
  ]},
  {id:"szombat",name:"Szombat",sub:"Push",pill:"pill-push",icon:'<path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"Fekvenyomás gépen",sets:2},
    {name:"Vállból nyomás",sets:2},
    {name:"Tárogatás",sets:2},
    {name:"Oldalemelés",sets:2},
    {name:"Tricepsz letolás csigán 1 kézzel",sets:2},
    {name:"Tricepsz fejfölött",sets:2},
  ]},
  {id:"vasarnap",name:"Vasárnap",sub:"Pull",pill:"pill-pull",icon:'<path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"Lehúzás két kézzel gépen",sets:2},
    {name:"Evezés szűk fogással",sets:2},
    {name:"Súlyzós bicepsz",sets:2},
    {name:"T-rúdas evezés",sets:2},
    {name:"Kalapács bicepsz",sets:2},
  ]},
];

const PR_LIST = [
  "Hack guggolás (gumi assist)","Combhajlító","Combfeszítő","Vádli","Comb tárogatás",
  "RDL","Bolgár guggolás","Fekvenyomás gépen","Vállból nyomás","Tárogatás",
  "Oldalemelés","Tricepsz letolás csigán 1 kézzel","Tricepsz fejfölött",
  "Lehúzás két kézzel gépen","Evezés szűk/széles fogással gépen","Evezés szűk fogással",
  "T-rúdas evezés","Bicepsz gépen","Kalapács bicepsz","Súlyzós bicepsz"
];

let S = {view:"naplo",cycle:0,week:0,openDays:{hetfo:true},data:{}};

function load(){
  try{const r=localStorage.getItem("edzes_v3");if(r){const p=JSON.parse(r);S.data=p.data||{};S.cycle=p.cycle||0;S.week=p.week||0;}}catch(e){}
}
function save(){
  try{localStorage.setItem("edzes_v3",JSON.stringify({data:S.data,cycle:S.cycle,week:S.week}));toast();}catch(e){}
}

function gc(c,w,d,e,s){return S.data?.[c]?.[w]?.[d]?.[e]?.[s]||{};}
function sc(c,w,d,e,s,f,v){
  if(!S.data[c])S.data[c]={};
  if(!S.data[c][w])S.data[c][w]={};
  if(!S.data[c][w][d])S.data[c][w][d]={};
  if(!S.data[c][w][d][e])S.data[c][w][d][e]={};
  if(!S.data[c][w][d][e][s])S.data[c][w][d][e][s]={};
  S.data[c][w][d][e][s][f]=v;
  save();
}

// Get previous week's data for reference
function getPrev(c,w,d,e,s){
  if(w>0) return gc(c,w-1,d,e,s);
  if(c>0) return gc(c-1,3,d,e,s); // last week of prev cycle
  return {};
}

function epley(suly,ism,rir){
  if(!suly||!ism)return null;
  const rep=parseFloat(ism)+(parseFloat(rir)||0);
  return (parseFloat(suly)*(1+rep/30)).toFixed(1);
}
function getCycleBest(exName,ci){
  let best={suly:null,ism:null,rir:null,est:null};
  for(let w=0;w<4;w++){
    for(const day of DAYS){
      for(const ex of day.exercises){
        if(ex.name!==exName)continue;
        for(let s=0;s<ex.sets;s++){
          const c=gc(ci,w,day.id,ex.name,s);
          if(!c.suly)continue;
          const e=epley(c.suly,c.ism,c.rir);
          if(!best.est||(e&&parseFloat(e)>parseFloat(best.est)))
            best={suly:c.suly,ism:c.ism,rir:c.rir,est:e};
        }
      }
    }
  }
  return best;
}
function getOverallPR(exName){
  let best={est:null,ci:null};
  const maxC=getMaxCycle()+1;
  for(let c=0;c<maxC;c++){
    const b=getCycleBest(exName,c);
    if(b.est&&(!best.est||parseFloat(b.est)>parseFloat(best.est)))
      best={est:b.est,ci:c};
  }
  return best;
}
function getMaxCycle(){
  // find highest cycle index with any data
  let max=2;
  const keys=Object.keys(S.data).map(Number);
  if(keys.length)max=Math.max(...keys);
  return max;
}

let toastT;
function toast(){
  const el=document.getElementById("toast");
  el.classList.add("show");
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove("show"),1600);
}

function render(){document.getElementById("app").innerHTML=buildApp();attach();}

function buildApp(){
  return buildHdr()+
    (S.view==="naplo"?buildNaplo():buildStat())+
    buildBnav();
}

function buildHdr(){
  const maxC=getMaxCycle();
  const cycles=[];
  for(let i=0;i<=maxC;i++) cycles.push(`<button class="tab ${i===S.cycle?'active':''}" data-type="cycle" data-idx="${i}">C${i+1}</button>`);
  if(S.view==="naplo") return `
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">Edző<em>Napló</em></div>
    </div>
    <div class="tab-row">${cycles.join("")}</div>
    <div class="tab-row">${["Week 1","Week 2","Week 3","Week 4"].map((w,i)=>`<button class="tab ${i===S.week?'active':''}" data-type="week" data-idx="${i}">${w}</button>`).join("")}</div>
  </div>`;
  return `<div class="hdr"><div class="hdr-top"><div class="logo">Edző<em>Napló</em></div><span style="font-size:13px;color:var(--text2);">Statisztika & PR</span></div></div>`;
}

function buildNaplo(){
  // Check if current cycle week 4 is complete (any data entered) and it's week 4 cycle 2 (index 2)
  const isLastWeek = S.week===3 && S.cycle===getMaxCycle();
  const banner = isLastWeek ? buildNewCycleBanner() : "";
  return `<div class="content">${banner}${DAYS.map(d=>buildDay(d)).join("")}</div>`;
}

function buildNewCycleBanner(){
  return `<div class="new-cycle-banner">
    <div class="ncb-title">Ciklus vége közeleg 🏁</div>
    <div class="ncb-sub">Ha lezártad ezt a ciklust, indíts egy új ciklust. Az eddigi adatok megmaradnak a statisztikában.</div>
    <button class="ncb-btn" id="new-cycle-btn">Új ciklus indítása →</button>
  </div>`;
}

function buildDay(day){
  const isOpen=S.openDays[day.id];
  return `<div class="day-block ${isOpen?'open':''}" id="day-${day.id}">
    <div class="day-hdr" data-day="${day.id}">
      <div class="day-pill ${day.pill}">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">${day.icon}</svg>
        ${day.sub}
      </div>
      <div class="day-name-text">${day.name}</div>
      <div class="day-chevron">⌄</div>
    </div>
    <div class="day-exlist">${day.exercises.map(ex=>buildEx(ex,day.id)).join("")}</div>
  </div>`;
}

function buildEx(ex,dayId){
  const rows=[];
  for(let s=0;s<ex.sets;s++){
    const cell=gc(S.cycle,S.week,dayId,ex.name,s);
    const prev=getPrev(S.cycle,S.week,dayId,ex.name,s);
    const prevSuly=prev.suly?`${prev.suly}kg`:'';
    const prevIsm=prev.ism?`×${prev.ism}`:'';
    const prevStr=(prevSuly||prevIsm)?`${prevSuly}${prevIsm}`:'–';
    rows.push(`<div class="set-row">
      <div class="set-lbl">S${s+1}</div>
      <div class="set-inp-wrap">
        <input class="set-inp" type="number" inputmode="decimal" placeholder="kg"
          value="${cell.suly||''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="suly">
        <div class="prev-val">${prevSuly||'–'}</div>
      </div>
      <div class="set-inp-wrap">
        <input class="set-inp" type="number" inputmode="numeric" placeholder="ism"
          value="${cell.ism||''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="ism">
        <div class="prev-val">${prevIsm||'–'}</div>
      </div>
      <div class="set-inp-wrap">
        <input class="set-inp rir" type="number" inputmode="numeric" placeholder="RIR"
          value="${cell.rir!==undefined&&cell.rir!==''?cell.rir:''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="rir">
        <div class="prev-val">${prev.rir!==undefined&&prev.rir!==''?'@'+prev.rir:'–'}</div>
      </div>
    </div>`);
  }
  return `<div class="ex-block">
    <div class="ex-name">${ex.name}</div>
    <div class="col-hdr">
      <div></div>
      <div class="col-h">Súly (kg)</div>
      <div class="col-h">Ismétlés</div>
      <div class="col-h">RIR</div>
    </div>
    ${rows.join("")}
  </div>`;
}

function buildStat(){
  const maxC=getMaxCycle();
  const cards=PR_LIST.map(exName=>{
    const cycles=[];
    let hasAny=false;
    const pr=getOverallPR(exName);
    for(let c=0;c<=maxC;c++){
      const b=getCycleBest(exName,c);
      if(b.suly)hasAny=true;
      const isPR=pr.ci===c&&b.est;
      cycles.push(`<div class="pr-cyc">
        <div class="pr-cyc-lbl">C${c+1}${isPR?' 🏆':''}</div>
        <div class="pr-1rm ${isPR?'is-pr':''}">${b.est?b.est+'kg':'–'}</div>
        <div class="pr-sub">${b.suly?b.suly+'kg':''}${b.ism?` × ${b.ism}`:''}${b.rir!==null&&b.rir!==undefined&&b.rir!==''?' @'+b.rir:''}</div>
      </div>`);
    }
    const badge=pr.est?`<div class="pr-badge">PR: ~${pr.est}kg</div>`:'';
    return `<div class="pr-card">
      <div class="pr-card-hdr">
        <div class="pr-ex">${exName}</div>
        ${badge}
      </div>
      ${hasAny?`<div class="pr-cycles">${cycles.join("")}</div>`:`<div class="pr-empty">Még nincs adat</div>`}
    </div>`;
  });
  return `<div class="pr-page">${cards.join("")}</div>`;
}

function buildBnav(){
  return `<nav class="bnav">
    <button class="bnav-btn ${S.view==='naplo'?'active':''}" data-view="naplo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 12h6M9 16h4" stroke-linecap="round"/></svg>
      Napló
    </button>
    <button class="bnav-btn ${S.view==='statisztika'?'active':''}" data-view="statisztika">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 18l4-8 4 6 4-4 4 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Statisztika
    </button>
  </nav>`;
}

function attach(){
  document.querySelectorAll("[data-type='cycle']").forEach(b=>b.addEventListener("click",()=>{S.cycle=+b.dataset.idx;render();}));
  document.querySelectorAll("[data-type='week']").forEach(b=>b.addEventListener("click",()=>{S.week=+b.dataset.idx;render();}));
  document.querySelectorAll(".day-hdr").forEach(h=>h.addEventListener("click",()=>{
    const id=h.dataset.day;
    S.openDays[id]=!S.openDays[id];
    const block=document.getElementById("day-"+id);
    block.classList.toggle("open",S.openDays[id]);
    block.querySelector(".day-chevron").style.transform=S.openDays[id]?"rotate(180deg)":"";
  }));
  document.querySelectorAll(".set-inp").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const{day,ex,set,field}=inp.dataset;
      sc(S.cycle,S.week,day,ex,+set,field,inp.value);
    });
    inp.addEventListener("blur",()=>{
      const{day,ex,set,field}=inp.dataset;
      sc(S.cycle,S.week,day,ex,+set,field,inp.value);
    });
  });
  document.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click",()=>{S.view=b.dataset.view;render();}));
  const ncb=document.getElementById("new-cycle-btn");
  if(ncb) ncb.addEventListener("click",()=>{
    const newC=getMaxCycle()+1;
    S.cycle=newC;S.week=0;
    render();
  });
}

load();render();
</script>
</body>
</html>
