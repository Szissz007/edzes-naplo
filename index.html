<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Edzésnapló</title>
<style>
:root{
  --navy:#1a2d5a;
  --navy2:#213570;
  --navy3:#2a4090;
  --blue:#2563eb;
  --blue2:#3b7fff;
  --accent:#4f9cff;
  --accent2:#7bb8ff;
  --bg:#f0f4fb;
  --bg2:#ffffff;
  --bg3:#e8eef8;
  --text:#0f1e3d;
  --text2:#4a5a80;
  --text3:#8898b8;
  --yellow:#f59e0b;
  --yellow-bg:#fffbeb;
  --yellow-border:#fde68a;
  --green:#10b981;
  --green-bg:#ecfdf5;
  --red:#ef4444;
  --r:16px;--r-sm:10px;--r-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:linear-gradient(160deg,var(--navy) 0%,var(--navy3) 100%);position:sticky;top:0;z-index:100;padding:0 18px;box-shadow:0 4px 24px rgba(26,45,90,0.18);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:58px;}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.logo em{color:var(--accent2);font-style:normal;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.45);font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}

/* TABS */
.tab-section{padding:10px 0 12px;}
.tab-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
.tab-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tab-row::-webkit-scrollbar{display:none;}
.tab{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:600;padding:7px 16px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;outline:none;}
.tab.active{background:#fff;border-color:#fff;color:var(--navy);}
.tab:active{transform:scale(.95);}

/* HERO CARD */
.hero-wrap{padding:16px 16px 0;}
.hero-card{background:linear-gradient(135deg,var(--navy2) 0%,var(--blue) 100%);border-radius:20px;padding:20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(37,99,235,0.25);}
.hero-card::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.06);}
.hero-card::after{content:'';position:absolute;right:20px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);}
.hero-label{font-size:11px;font-weight:700;letter-spacing:0.6px;opacity:0.6;text-transform:uppercase;margin-bottom:4px;}
.hero-week{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:2px;}
.hero-cycle{font-size:13px;opacity:0.6;font-weight:500;}
.hero-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-pill{background:rgba(255,255,255,0.15);border-radius:12px;padding:5px 12px;font-size:12px;font-weight:600;}

/* CONTENT */
.content{padding:14px 16px 96px;}

/* SECTION TITLE */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin:16px 0 8px 2px;}

/* DAY CARD */
.day-card{background:var(--bg2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.day-hdr{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none;}
.day-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-icon-wrap svg{width:20px;height:20px;}
.day-info{flex:1;}
.day-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.2;}
.day-sub{font-size:12px;color:var(--text3);font-weight:500;margin-top:1px;}
.day-chevron{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s;}
.day-chevron svg{width:14px;height:14px;stroke:var(--text3);}
.day-card.open .day-chevron{transform:rotate(180deg);}
.day-exlist{display:none;border-top:1px solid var(--bg3);}
.day-card.open .day-exlist{display:block;}

/* EXERCISE */
.ex-block{padding:14px 16px 10px;border-bottom:1px solid var(--bg3);}
.ex-block:last-child{border-bottom:none;}
.ex-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;}
.col-hdr{display:grid;grid-template-columns:30px 1fr 1fr 64px;gap:6px;margin-bottom:6px;}
.col-h{font-size:10px;font-weight:700;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:0.5px;}

/* SET ROW */
.set-row{display:grid;grid-template-columns:30px 1fr 1fr 64px;gap:6px;margin-bottom:6px;align-items:start;}
.set-lbl{height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:var(--r-xs);font-size:11px;font-weight:800;color:var(--text3);}
.inp-wrap{display:flex;flex-direction:column;gap:3px;}
.set-inp{background:var(--bg3);border:1.5px solid transparent;border-radius:var(--r-xs);color:var(--text);font-size:17px;font-weight:700;height:44px;padding:0 8px;text-align:center;width:100%;outline:none;-webkit-appearance:none;transition:all .15s;}
.set-inp:focus{border-color:var(--blue);background:#eff6ff;color:var(--blue);}
.set-inp::placeholder{color:var(--text3);font-size:13px;font-weight:400;}
.set-inp.rir{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow);}
.set-inp.rir:focus{border-color:var(--yellow);background:#fef9c3;}
.prev-val{font-size:10px;color:var(--text3);text-align:center;height:13px;line-height:13px;font-weight:500;}

/* NEW CYCLE BANNER */
.ncb{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);border-radius:var(--r);padding:18px;margin-bottom:4px;color:#fff;}
.ncb-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.ncb-sub{font-size:13px;opacity:0.7;margin-bottom:14px;line-height:1.4;}
.ncb-btn{background:#fff;border:none;border-radius:var(--r-sm);color:var(--navy);font-size:14px;font-weight:800;padding:12px 20px;cursor:pointer;width:100%;transition:opacity .15s;}
.ncb-btn:active{opacity:.85;}

/* STAT PAGE */
.pr-page{padding:14px 16px 96px;}
.pr-card{background:var(--bg2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.pr-card-hdr{padding:13px 16px 11px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pr-ex{font-size:14px;font-weight:700;flex:1;line-height:1.3;color:var(--text);}
.pr-badge{background:linear-gradient(90deg,var(--blue),var(--accent));color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;white-space:nowrap;flex-shrink:0;}
.pr-cycles{display:flex;overflow-x:auto;scrollbar-width:none;}
.pr-cycles::-webkit-scrollbar{display:none;}
.pr-cyc{padding:12px 14px;text-align:center;border-right:1px solid var(--bg3);flex-shrink:0;min-width:90px;}
.pr-cyc:last-child{border-right:none;}
.pr-cyc-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.pr-1rm{font-size:19px;font-weight:800;color:var(--text2);}
.pr-1rm.is-pr{color:var(--blue);}
.pr-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}
.pr-empty{font-size:13px;color:var(--text3);font-style:italic;padding:12px 16px;}

/* TOAST */
.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--green);color:#fff;font-size:13px;font-weight:700;padding:9px 22px;border-radius:20px;opacity:0;transition:all .25s;z-index:500;pointer-events:none;box-shadow:0 4px 16px rgba(16,185,129,0.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0 13px;color:var(--text3);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border:none;background:none;transition:color .15s;}
.bnav-btn svg{width:22px;height:22px;stroke-width:1.8;}
.bnav-btn.active{color:var(--blue);}
.bnav-btn:active{opacity:.6;}

/* DAY COLORS */
.ic-leg{background:#fef2f2;}.ic-leg svg{stroke:#ef4444;}
.ic-upper{background:#eff6ff;}.ic-upper svg{stroke:#3b82f6;}
.ic-lower{background:#fff7ed;}.ic-lower svg{stroke:#f97316;}
.ic-push{background:#faf5ff;}.ic-push svg{stroke:#8b5cf6;}
.ic-pull{background:#f0fdf4;}.ic-pull svg{stroke:#22c55e;}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
</style>
</head>
<body>
<div class="toast" id="toast">Mentve ✓</div>
<div id="app"></div>
<script>
const DAYS=[
  {id:"hetfo",name:"Hétfő",sub:"Leg nap",ic:"ic-leg",
   icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"Hack guggolás (gumi assist)",sets:2},
    {name:"Combhajlító",sets:2},
    {name:"Combfeszítő",sets:2},
    {name:"Vádli",sets:3},
    {name:"Comb tárogatás",sets:2},
    {name:"Hasazás",sets:3},
  ]},
  {id:"szerda",name:"Szerda",sub:"Felső test",ic:"ic-upper",
   icon:'<path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"Fekvenyomás gépen",sets:2},
    {name:"Lehúzás két kézzel gépen",sets:2},
    {name:"Evezés szűk/széles fogással gépen",sets:2},
    {name:"Vállból nyomás",sets:2},
    {name:"Tricepsz letolás csigán 1 kézzel",sets:2},
    {name:"Bicepsz gépen",sets:2},
  ]},
  {id:"csutortok",name:"Csütörtök",sub:"Alsó test",ic:"ic-lower",
   icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-linecap="round" stroke-linejoin="round"/>',
   exercises:[
    {name:"RDL",sets:2},
    {name:"Bolgár guggolás",sets:2},
    {name:"Combhajlító",sets:2},
    {name:"Vádli",sets:3},
    {name:"Comb tárogatás",sets:2},
    {name:"Hasazás",sets:3},
  ]},
  {id:"szombat",name:"Szombat",sub:"Push nap",ic:"ic-push",
   icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12" stroke-linecap="round"/>',
   exercises:[
    {name:"Fekvenyomás gépen",sets:2},
    {name:"Vállból nyomás",sets:2},
    {name:"Tárogatás",sets:2},
    {name:"Oldalemelés",sets:2},
    {name:"Tricepsz letolás csigán 1 kézzel",sets:2},
    {name:"Tricepsz fejfölött",sets:2},
  ]},
  {id:"vasarnap",name:"Vasárnap",sub:"Pull nap",ic:"ic-pull",
   icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 16 8 12 12 8"/><line x1="16" y1="12" x2="8" y2="12" stroke-linecap="round"/>',
   exercises:[
    {name:"Lehúzás két kézzel gépen",sets:2},
    {name:"Evezés szűk fogással",sets:2},
    {name:"Súlyzós bicepsz",sets:2},
    {name:"T-rúdas evezés",sets:2},
    {name:"Kalapács bicepsz",sets:2},
  ]},
];

const PR_LIST=[
  "Hack guggolás (gumi assist)","Combhajlító","Combfeszítő","Vádli","Comb tárogatás",
  "RDL","Bolgár guggolás","Fekvenyomás gépen","Vállból nyomás","Tárogatás",
  "Oldalemelés","Tricepsz letolás csigán 1 kézzel","Tricepsz fejfölött",
  "Lehúzás két kézzel gépen","Evezés szűk/széles fogással gépen","Evezés szűk fogással",
  "T-rúdas evezés","Bicepsz gépen","Kalapács bicepsz","Súlyzós bicepsz"
];

const WEEKS=["Week 1","Week 2","Week 3","Week 4"];

let S={view:"naplo",cycle:0,week:0,openDays:{hetfo:true},data:{}};

function load(){
  try{const r=localStorage.getItem("edzes_v4");if(r){const p=JSON.parse(r);S.data=p.data||{};S.cycle=p.cycle||0;S.week=p.week||0;}}catch(e){}
}
function save(){
  try{localStorage.setItem("edzes_v4",JSON.stringify({data:S.data,cycle:S.cycle,week:S.week}));showToast();}catch(e){}
}
function gc(c,w,d,e,s){return S.data?.[c]?.[w]?.[d]?.[e]?.[s]||{};}
function sc(c,w,d,e,s,f,v){
  if(!S.data[c])S.data[c]={};
  if(!S.data[c][w])S.data[c][w]={};
  if(!S.data[c][w][d])S.data[c][w][d]={};
  if(!S.data[c][w][d][e])S.data[c][w][d][e]={};
  if(!S.data[c][w][d][e][s])S.data[c][w][d][e][s]={};
  S.data[c][w][d][e][s][f]=v;
  save();
}
function getPrev(c,w,d,e,s){
  if(w>0)return gc(c,w-1,d,e,s);
  if(c>0)return gc(c-1,3,d,e,s);
  return{};
}
function epley(su,is,ri){
  if(!su||!is)return null;
  return(parseFloat(su)*(1+(parseFloat(is)+(parseFloat(ri)||0))/30)).toFixed(1);
}
function getCycleBest(ex,ci){
  let best={suly:null,ism:null,rir:null,est:null};
  for(let w=0;w<4;w++)for(const day of DAYS)for(const e of day.exercises){
    if(e.name!==ex)continue;
    for(let s=0;s<e.sets;s++){
      const c=gc(ci,w,day.id,e.name,s);
      if(!c.suly)continue;
      const est=epley(c.suly,c.ism,c.rir);
      if(!best.est||(est&&parseFloat(est)>parseFloat(best.est)))
        best={suly:c.suly,ism:c.ism,rir:c.rir,est};
    }
  }
  return best;
}
function getOverallPR(ex){
  let best={est:null,ci:null};
  const maxC=getMaxCycle();
  for(let c=0;c<=maxC;c++){
    const b=getCycleBest(ex,c);
    if(b.est&&(!best.est||parseFloat(b.est)>parseFloat(best.est)))best={est:b.est,ci:c};
  }
  return best;
}
function getMaxCycle(){
  const keys=Object.keys(S.data).map(Number);
  return keys.length?Math.max(...keys):0;
}

let toastT;
function showToast(){
  const el=document.getElementById("toast");
  el.classList.add("show");
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove("show"),1600);
}

function render(){document.getElementById("app").innerHTML=buildApp();attach();}

function buildApp(){
  return buildHdr()+(S.view==="naplo"?buildNaplo():buildStat())+buildBnav();
}

function buildHdr(){
  const maxC=getMaxCycle();
  // Always show at least C1..C(maxC+1) — the "next" cycle only if we actually started it
  const numCycles=maxC+1;
  const cycleTabs=Array.from({length:numCycles},(_,i)=>
    `<button class="tab ${i===S.cycle?'active':''}" data-type="cycle" data-idx="${i}">C${i+1}</button>`
  ).join("");
  const weekTabs=WEEKS.map((w,i)=>
    `<button class="tab ${i===S.week?'active':''}" data-type="week" data-idx="${i}">${w}</button>`
  ).join("");

  if(S.view==="statisztika"){
    return`<div class="hdr">
      <div class="hdr-top">
        <div class="logo">Edző<em>Napló</em></div>
        <div class="hdr-sub">Statisztika & PR</div>
      </div>
    </div>`;
  }
  return`<div class="hdr">
    <div class="hdr-top">
      <div class="logo">Edző<em>Napló</em></div>
    </div>
    <div class="tab-section">
      <div class="tab-label">Ciklus</div>
      <div class="tab-row">${cycleTabs}</div>
    </div>
    <div class="tab-section">
      <div class="tab-label">Hét</div>
      <div class="tab-row">${weekTabs}</div>
    </div>
  </div>`;
}

function buildNaplo(){
  const isLast=S.week===3&&S.cycle===getMaxCycle();
  const banner=isLast?`<div class="ncb">
    <div class="ncb-title">Ciklus vége közeleg 🏁</div>
    <div class="ncb-sub">Ha lezártad ezt a ciklust, indíts egy újat. Az eddigi adatok megmaradnak.</div>
    <button class="ncb-btn" id="ncb-btn">Új ciklus indítása →</button>
  </div>`:'';

  const heroDay=DAYS.find(d=>S.openDays[d.id])||DAYS[0];
  const hero=`<div class="hero-wrap">
    <div class="hero-card">
      <div class="hero-label">Aktív edzés</div>
      <div class="hero-week">C${S.cycle+1} – ${WEEKS[S.week]}</div>
      <div class="hero-cycle">Ciklus ${S.cycle+1}, ${WEEKS[S.week]}</div>
      <div class="hero-pills">
        ${DAYS.map(d=>`<div class="hero-pill">${d.sub}</div>`).join('')}
      </div>
    </div>
  </div>`;

  return`<div class="content">${hero}<div class="section-title">Edzésnapló</div>${banner}${DAYS.map(d=>buildDay(d)).join('')}</div>`;
}

function buildDay(day){
  const isOpen=S.openDays[day.id];
  return`<div class="day-card ${isOpen?'open':''}" id="day-${day.id}">
    <div class="day-hdr" data-day="${day.id}">
      <div class="day-icon-wrap ${day.ic}">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg">${day.icon}</svg>
      </div>
      <div class="day-info">
        <div class="day-name">${day.name}</div>
        <div class="day-sub">${day.sub} · ${day.exercises.length} gyakorlat</div>
      </div>
      <div class="day-chevron">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="day-exlist">${day.exercises.map(ex=>buildEx(ex,day.id)).join('')}</div>
  </div>`;
}

function buildEx(ex,dayId){
  const rows=[];
  for(let s=0;s<ex.sets;s++){
    const cell=gc(S.cycle,S.week,dayId,ex.name,s);
    const prev=getPrev(S.cycle,S.week,dayId,ex.name,s);
    const pS=prev.suly?`${prev.suly}kg`:'–';
    const pI=prev.ism?`×${prev.ism}`:'';
    const pR=prev.rir!==undefined&&prev.rir!==''?`@${prev.rir}`:'';
    rows.push(`<div class="set-row">
      <div class="set-lbl">S${s+1}</div>
      <div class="inp-wrap">
        <input class="set-inp" type="number" inputmode="decimal" placeholder="kg"
          value="${cell.suly||''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="suly">
        <div class="prev-val">${pS}</div>
      </div>
      <div class="inp-wrap">
        <input class="set-inp" type="number" inputmode="numeric" placeholder="ism"
          value="${cell.ism||''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="ism">
        <div class="prev-val">${pI||'–'}</div>
      </div>
      <div class="inp-wrap">
        <input class="set-inp rir" type="number" inputmode="numeric" placeholder="RIR"
          value="${cell.rir!==undefined&&cell.rir!==''?cell.rir:''}"
          data-day="${dayId}" data-ex="${ex.name}" data-set="${s}" data-field="rir">
        <div class="prev-val">${pR||'–'}</div>
      </div>
    </div>`);
  }
  return`<div class="ex-block">
    <div class="ex-name">${ex.name}</div>
    <div class="col-hdr">
      <div></div>
      <div class="col-h">Súly kg</div>
      <div class="col-h">Ismétlés</div>
      <div class="col-h">RIR</div>
    </div>
    ${rows.join('')}
  </div>`;
}

function buildStat(){
  const maxC=getMaxCycle();
  const cards=PR_LIST.map(exName=>{
    let hasAny=false;
    const pr=getOverallPR(exName);
    const cols=[];
    for(let c=0;c<=maxC;c++){
      const b=getCycleBest(exName,c);
      if(b.suly)hasAny=true;
      const isPR=pr.ci===c&&b.est;
      cols.push(`<div class="pr-cyc">
        <div class="pr-cyc-lbl">C${c+1}${isPR?' 🏆':''}</div>
        <div class="pr-1rm ${isPR?'is-pr':''}">${b.est?b.est+'kg':'–'}</div>
        <div class="pr-sub">${b.suly?b.suly+'kg':''}${b.ism?` ×${b.ism}`:''}${b.rir!==undefined&&b.rir!==''&&b.rir!==null?' @'+b.rir:''}</div>
      </div>`);
    }
    const badge=pr.est?`<div class="pr-badge">PR ~${pr.est}kg</div>`:'';
    return`<div class="pr-card">
      <div class="pr-card-hdr">
        <div class="pr-ex">${exName}</div>${badge}
      </div>
      ${hasAny?`<div class="pr-cycles">${cols.join('')}</div>`:`<div class="pr-empty">Még nincs adat</div>`}
    </div>`;
  });
  return`<div class="pr-page"><div class="section-title" style="margin-top:0">Személyes rekordok</div>${cards.join('')}</div>`;
}

function buildBnav(){
  return`<nav class="bnav">
    <button class="bnav-btn ${S.view==='naplo'?'active':''}" data-view="naplo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 12h6M9 16h4" stroke-linecap="round"/></svg>
      Napló
    </button>
    <button class="bnav-btn ${S.view==='statisztika'?'active':''}" data-view="statisztika">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Statisztika
    </button>
  </nav>`;
}

function attach(){
  document.querySelectorAll("[data-type='cycle']").forEach(b=>b.addEventListener("click",()=>{S.cycle=+b.dataset.idx;render();}));
  document.querySelectorAll("[data-type='week']").forEach(b=>b.addEventListener("click",()=>{S.week=+b.dataset.idx;render();}));
  document.querySelectorAll(".day-hdr").forEach(h=>h.addEventListener("click",()=>{
    const id=h.dataset.day;
    S.openDays[id]=!S.openDays[id];
    document.getElementById("day-"+id).classList.toggle("open",S.openDays[id]);
  }));
  document.querySelectorAll(".set-inp").forEach(inp=>{
    const handler=()=>{const{day,ex,set,field}=inp.dataset;sc(S.cycle,S.week,day,ex,+set,field,inp.value);};
    inp.addEventListener("change",handler);
    inp.addEventListener("blur",handler);
  });
  document.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click",()=>{S.view=b.dataset.view;render();}));
  const ncb=document.getElementById("ncb-btn");
  if(ncb)ncb.addEventListener("click",()=>{
    S.cycle=getMaxCycle()+1;S.week=0;render();
  });
}

load();render();
</script>
</body>
